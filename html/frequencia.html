<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Frequência Escolar</title>
<link rel="stylesheet" href="../css/frequencia.css">

</head>

<body>

<header>
Sua Frequência Escolar
</header>

<div class="container">

<!-- Presença -->

<div class="card presenca">

<h2>Presença</h2>

<div class="circle">
    <div class="inside">
        92%
    </div>
</div>

<p>Frequência geral do aluno</p>

</div>

<!-- Agenda -->

<div class="card">

<h2>Agenda de Faltas</h2>

<div class="falta" onclick="mostrarAula('Matemática','Equação do 2º grau')">
10/03 - Matemática
</div>

<div class="falta" onclick="mostrarAula('História','Revolução Francesa')">
08/03 - História
</div>

<div class="falta" onclick="mostrarAula('Biologia','Sistema Respiratório')">
05/03 - Biologia
</div>

<div id="aula"></div>

</div>

</div>

<script>

function mostrarAula(materia, aula){

let div = document.getElementById("aula");

div.style.display = "block";

div.innerHTML = `
<h3>${materia}</h3>
<p>Aula perdida: <strong>${aula}</strong></p>
<p>Conteúdo disponível na plataforma.</p>
`;

}

</script>

</body>
</html>
